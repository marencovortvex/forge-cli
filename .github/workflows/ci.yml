name: ci

on:
  push:
  pull_request:

jobs:
  forge-cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: forge/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify (compile + governance artifacts)
        run: node dist/cli.js verify ../examples/demoapp.yaml -o ../output

      - name: Negative specs must fail (governance = correct blocking)
        run: |
          set -e
          node dist/cli.js verify ../examples/invalid-role.yaml -o ../output && exit 1 || true
          node dist/cli.js verify ../examples/missing-policy.yaml -o ../output && exit 1 || true
          node dist/cli.js verify ../examples/invalid-flow.yaml -o ../output && exit 1 || true
