spec_version: v0

app:
  name: MissingPolicy
  version: 0.1.0

auth:
  mode: email_password

roles:
  - admin
  - user

domain:
  entities:
    User:
      fields:
        id: { type: uuid, primary: true }
        email: { type: email, unique: true, pii: true }
        role: { type: enum, values: [admin, user] }

flows:
  - name: create_user
    actor: admin
    steps:
      - action: create
        entity: User

invariants:
  - name: unique_user_email
    kind: database
    rule: "User.email is unique"

security:
  policies:
    - name: some_other_policy
      kind: logging
      rule: "something else"

deploy:
  cloud: gcp
  runtime: cloud_run
